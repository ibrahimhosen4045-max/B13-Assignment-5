<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Germania+One&family=Griffy&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nova+Square&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Press+Start+2P&family=Quicksand:wght@300..700&family=Story+Script&family=Work+Sans:ital,wght@0,100..900;1,100..900&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

<style>
    *{
        font-family: "Geist", sans-serif;
    }
</style>
</head>
<body class="bg-gray-100">
   <header>
    <div class="navbar bg-base-100 shadow-sm">
    <div class="flex justify-between w-11/12 mx-auto">
        <div class="flex-1">
            <a class="btn btn-ghost text-2xl">
            <img class="w-9" src="./assets/github-logo.png" alt="">
            <span>GitHub Issues Tracker</span>
            </a>
        </div>
        <div class="flex gap-2">
            <label class="input">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g
            stroke-linejoin="round"
            stroke-linecap="round"
            stroke-width="2.5"
            fill="none"
            stroke="currentColor"
            >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
            </g>
            </svg>
            <input type="search" required placeholder="Search" />
            </label>
            <button class="btn btn-primary">+ New Issue</button>
    
        </div>
    </div>
    </div>
   </header>

   <main class=""> 
    <!-- section-toggle-button -->
    <section class="pt-20 pb-5 ">
        <div class="flex gap-3 p-6 container mx-auto bg-white rounded-lg shadow-lg ">
           <button onclick="toggoling('all-card-btn')" id="all-card-btn" class="btn w-25">All</button> 
           <button onclick="toggoling('Open-card-btn')" id="Open-card-btn" class="btn w-25">Open</button> 
           <button onclick="toggoling('close-card-btn')" id="close-card-btn" class="btn w-25">Closed</button> 
        </div>
    </section>
    <section class="container mx-auto pb-0.5">
        <div class="flex justify-between py-4 px-4 rounded-lg bg-white shadow-lg">
            <div class="flex flex-1 gap-3">
                <img class="p-2 bg-[#A855F750] rounded-full " src="./assets/Aperture.png" alt="">
                <div>
                    <h1 class="text-xl font-semibold"><span id="card-count">0</span> Issues</h1>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex flex-1 items-center justify-end gap-5">
                <button class="font-medium flex items-center gap-2">
                    <div class="size-4 bg-green-500 rounded-full"></div>
                    <span>Open</span>
                </button>
                <button class="font-medium flex items-center gap-2">
                    <div class="size-4 bg-[#A855F7] rounded-full"></div>
                    <span>Closed</span>
                </button>
            </div>
        </div>
    </section>

    <!-- all-card-section -->

    <section class="container mx-auto px-3 bg-gray-50 py-10 rounded-lg shadow-md">
        
        <section id="spiner" class="flex justify-center items-center  hidden ">
            <span class="loading loading-spinner loading-md"></span>
        </section>

        <section id="all-card" class=" grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3.5 ">
      
        </section>
    </section>

    <!-- modal -->

    <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box max-w-none max-h-none w-[700px]">
    <div id="details-container" class="p-4 space-y-6">
        
  </div>
</dialog>

   </main>
   <script src="./home.js"></script>
</body>
</html>
